<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Skynet Global Logistics</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/public/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: hsl(220, 95%, 60%);
      --primary-dark: hsl(220, 90%, 48%);
      --primary-light: hsla(220, 95%, 60%, 0.15);
      --secondary: hsl(220, 30%, 12%);
      --bg: hsl(220, 30%, 8%);
      --surface-glass: rgba(255, 255, 255, 0.04);
      --surface-glass-hover: rgba(255, 255, 255, 0.07);
      --border-glass: rgba(255, 255, 255, 0.09);
      --text: hsl(0, 0%, 95%);
      --text-muted: hsl(220, 10%, 70%);
      --radius: 16px;
      --radius-sm: 10px;
      --success: hsl(152, 69%, 45%);
      --danger: hsl(0, 80%, 60%);
      --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Background Glows */
    .glow-blob {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, hsla(220, 95%, 55%, 0.15) 0%, transparent 70%);
      filter: blur(50px);
      z-index: 1;
      pointer-events: none;
    }
    .glow-blob-1 { top: -100px; left: -100px; }
    .glow-blob-2 { bottom: -100px; right: -100px; }

    /* Login Card Container */
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      z-index: 10;
      position: relative;
    }

    .login-card {
      background: var(--surface-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius);
      padding: 40px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      width: 100%;
      transition: var(--transition);
    }
    
    .login-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    /* Brand Section */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      text-align: center;
    }
    .brand img {
      height: 44px;
      margin-bottom: 12px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
    }
    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #ffffff, hsl(220, 20%, 80%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand p {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Form Controls */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .form-control {
      width: 100%;
      padding: 13px 14px 13px 44px;
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: inherit;
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      transition: var(--transition);
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    /* Error Message Area */
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: shake 0.4s ease-in-out;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Button styles */
    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: none;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(45deg);
      transition: transform 0.5s ease;
      pointer-events: none;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.45);
    }
    .btn-login:hover::after {
      transform: translate(50%, 50%) rotate(45deg);
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .btn-login:disabled {
      background: hsl(220, 15%, 25%);
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Back Link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.88rem;
      transition: var(--transition);
    }
    .back-link:hover {
      color: var(--text);
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Neon ambient glow points -->
  <div class="glow-blob glow-blob-1"></div>
  <div class="glow-blob glow-blob-2"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <img src="/public/logo.png" alt="Skynet Logo">
        <h1>Skynet Control</h1>
        <p>Admin Portal Authentication</p>
      </div>

      <!-- Error box -->
      <div class="error-box" id="errorBox">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorMessage">Invalid username or password.</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-login" id="submitBtn">
          <span class="spinner" id="btnSpinner"></span>
          <span id="btnText">Sign In</span>
        </button>
      </form>

      <a href="/" class="back-link">← Return to Homepage</a>
    </div>
  </div>

  <script>
    // Redirect if already logged in (quick local check)
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin';
    }

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnText = document.getElementById('btnText');
    const errorBox = document.getElementById('errorBox');
    const errorMessage = document.getElementById('errorMessage');

    const showError = (msg) => {
      errorMessage.textContent = msg;
      errorBox.style.display = 'flex';
      // Trigger a reflow to restart shake animation
      errorBox.style.animation = 'none';
      errorBox.offsetHeight; /* trigger reflow */
      errorBox.style.animation = null;
    };

    const hideError = () => {
      errorBox.style.display = 'none';
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please fill in all fields.');
        return;
      }

      // Enter loading state
      submitBtn.disabled = true;
      btnSpinner.style.display = 'block';
      btnText.textContent = 'Authenticating...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success! Save token and redirect
          localStorage.setItem('adminToken', data.data.token);
          
          btnText.textContent = 'Redirecting...';
          setTimeout(() => {
            window.location.href = '/admin';
          }, 800);
        } else {
          // API error
          showError(data.message || 'Authentication failed. Please check credentials.');
          submitBtn.disabled = false;
          btnSpinner.style.display = 'none';
          btnText.textContent = 'Sign In';
        }
      } catch (err) {
        console.error('Login error:', err);
        showError('Network error. Please try again later.');
        submitBtn.disabled = false;
        btnSpinner.style.display = 'none';
        btnText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
